name: Compute asar SHA-256 (one-shot)

# Transient verification helper: downloads a tested Claude Desktop build from
# Anthropic's CDN on a runner (open internet) and prints its size + SHA-256 to
# the job log so it can be recorded in COMPAT.md. Nothing is stored or
# committed; this workflow is removed after the hash is captured.

permissions:
  contents: read

on:
  push:
    branches: [claude/asar-update-default-decision-hm6CT]
    paths:
      - .github/workflows/compute-asar-sha.yml
  workflow_dispatch:

jobs:
  hash:
    runs-on: ubuntu-latest
    steps:
      - name: Download and hash 1.6259.1
        run: |
          url="https://downloads.claude.ai/releases/darwin/universal/1.6259.1/Claude-5095e7dddcba4ca974d351ee397e17d204814f07.dmg"
          curl -fL --retry 3 -o claude.dmg "$url"
          echo "VERSION=1.6259.1"
          echo "SIZE_BYTES=$(stat -c%s claude.dmg)"
          echo "SHA256=$(sha256sum claude.dmg | awk '{print $1}')"
